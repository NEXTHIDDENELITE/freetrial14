<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE 3-DAY TRIAL</title>
    <link rel="icon" type="image/png" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-green: #00ff66;
            --gradient-btn: linear-gradient(135deg, #00ff66, #00b300);
            --danger: #ff0055;
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 0 40px rgba(255, 0, 0, 0.25);
            --neon-red: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background: #030305;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ডার্ক ব্যাকগ্রাউন্ড ভাইব */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d0d13 0%, #030305 100%);
            z-index: -1;
        }

        /* 🎴 মেইন প্যানেল কার্ড (রেড গ্লো বর্ডার) */
        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(13, 13, 18, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--neon-red);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 1;
        }

        /* ⎔ প্যানেল লোগো ওয়াটারমার্ক */
        .logo-area {
            width: 65px;
            height: 65px;
            margin: 0 auto 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .panel-logo {
            width: 45px;
            height: 45px;
            object-fit: cover;
        }

        /* ✏️ টেক্সট ফরম্যাটিং */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-green);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        .subtitle {
            font-size: 13px;
            color: #8a90a1;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* 📥 ইনপুট ফিল্ড লেবেল ও বক্স */
        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: #6c7281;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: #09090d;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 16px;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: rgba(0, 255, 102, 0.5);
            background: #0d0d14;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.1);
        }

        /* 🟢 আল্ট্রা প্রিমিয়াম সাবমিট বাটন (Best Upgrade) */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-btn);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 1.5px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        /* বাটনের ভেতরের আইকন অ্যানিমেশন */
        .submit-btn i {
            font-size: 14px;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-green), 0 5px 15px rgba(0,0,0,0.5);
            color: #000;
        }

        .submit-btn:hover i {
            transform: translateX(5px);
        }

        /* বাটন শাইনি রিফ্লেকশন লাইট ইফেক্ট */
        .submit-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -50%; width: 30%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .submit-btn:hover::after {
            left: 120%;
        }

        /* 🔄 ইউনিভার্সাল কুশন লোডার */
        .loader-node {
            display: none;
            margin-top: 15px;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            margin: 15px auto;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 💬 টোস্ট নোটিফিকেশন */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0a0f;
            border: 1px solid var(--primary-green);
            padding: 12px 30px;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            z-index: 10000;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0, 255, 102, 0.15);
        }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div id="status-toast" class="toast">REQUEST INITIATED</div>

    <div class="card">
        <div class="logo-area">
            <img src="logo.png" class="panel-logo" alt="PANEL LOGO" onerror="this.style.display='none'">
        </div>

        <h1>Free 3-Day Trial</h1>
        <div class="subtitle">Enter your UID to get 3 days of free access</div>

        <div id="form-container">
            <div class="input-group">
                <label class="input-label">Game UID</label>
                <input type="number" id="game-uid" placeholder="Enter your UID" autocomplete="off">
            </div>

            <button class="submit-btn" onclick="processTrialRequest()">
                <span>Claim Free Access</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div id="loader-screen" class="loader-node">
            <div class="spinner"></div>
            <p style="font-size: 12px; font-family: 'Orbitron'; color: #6c7281;">UPLINKING DATA INJECTION NOCTURNE...</p>
        </div>
    </div>

    <script>
        // টেলিগ্রাম কনফিগারেশন মডিউল
        const botToken = "8475138855:AAFQMWnAHUJqGsx06QZFw60lXugY15ynkig"; 
        const chatId = "8135816344"; 

        function showNotification(msg, isError = false) {
            const toast = document.getElementById("status-toast");
            toast.innerText = msg;
            toast.style.borderColor = isError ? "#ff0055" : "#00ff66";
            toast.style.boxShadow = isError ? "0 10px 25px rgba(255, 0, 85, 0.2)" : "0 10px 25px rgba(0, 255, 102, 0.2)";
            toast.style.top = "30px";
            setTimeout(() => { toast.style.top = "-100px"; }, 3000);
        }

        async function processTrialRequest() {
            const uidField = document.getElementById("game-uid");
            const uidValue = uidField.value.trim();

            // ভ্যালিডেশন চেক
            if (!uidValue) {
                showNotification("PLEASE ENTER A VALID GAME UID!", true);
                return;
            }

            // ইন্টারফেস পরিবর্তন (লোডিং স্ক্রিন অন)
            document.getElementById("form-container").style.display = "none";
            document.getElementById("loader-screen").style.display = "block";

            // ইউজারের আইপি এড্রেস ট্র্যাক করার চেষ্টা (মেসেজ আরও প্রিমিয়াম করার জন্য)
            let userIP = "Unknown/Proxy";
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIP = ipData.ip;
            } catch(e) { console.log("IP fetch bypass"); }

            // টেলিগ্রাম প্রফেশনাল ডাটা ফরম্যাট মেকিং
            const rawMessage = `🎁 *NEW FREE 3-DAY TRIAL CLAIM* 🎁\n\n` +
                               `🆔 *Target UID:* \`${uidValue}\`\n` +
                               `⏳ *Duration:* 3 Days Premium Access\n` +
                               `🌐 *User IP:* ${userIP}\n` +
                               `📡 *Status:* Token Pending Deployment / Active`;

            // ফেচ মেথড এপিআই হিট
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: rawMessage,
                    parse_mode: "Markdown"
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    showNotification("TRIAL CLAIMED SUCCESSFULLY!");
                    setTimeout(() => {
                        location.reload(); // পেজ রিলোড দিয়ে ফ্রেশ করা
                    }, 2500);
                } else {
                    throw new Error("Telegram API Reject");
                }
            })
            .catch(err => {
                showNotification("SERVER CONFIG ERROR! TRY AGAIN.", true);
                document.getElementById("form-container").style.display = "block";
                document.getElementById("loader-screen").style.display = "none";
            });
        }
    </script>
</body>
</html>
