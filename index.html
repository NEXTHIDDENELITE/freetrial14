<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHE UID FREE TRIAL - PRO</title>
    <!-- এই লাইনটি যুক্ত করা হয়েছে -->
    <link rel="icon" type="image/png" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00d4ff;
            --danger: #ff0055;
            --glass-border: rgba(255,255,255,0.1);
            --card-shadow: 0 0 30px rgba(0,255,204,0.15);
            --premium: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani',sans-serif;
        }

        body {
            background: #030305;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            overflow-x: hidden;
        }

        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0a1128 0%, #030305 100%);
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--secondary);
            filter: blur(140px);
            opacity: .15;
            border-radius: 50%;
            animation: move 12s infinite alternate ease-in-out;
        }

        @keyframes move {
            0% {
                transform: translate(-10%,-10%);
            }

            100% {
                transform: translate(60%,40%);
            }
        }

        .card {
            width: 100%;
            max-width: 450px;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            position: relative;
            box-shadow: var(--card-shadow);
            z-index: 1;
        }

            .card::before {
                content: '';
                position: absolute;
                top: -2px;
                left: -2px;
                right: -2px;
                bottom: -2px;
                background: linear-gradient(45deg,var(--primary),transparent,var(--secondary));
                z-index: -1;
                border-radius: 26px;
                animation: borderFlow 6s linear infinite;
                opacity: .4;
            }

            .card.premium-glow::before {
                background: linear-gradient(45deg, var(--premium), transparent, #ff6600);
                animation: borderFlowPremium 4s linear infinite;
                opacity: 0.8;
            }

        @keyframes borderFlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        @keyframes borderFlowPremium {
            0% { opacity: 0.5; box-shadow: 0 0 10px var(--premium); }
            50% { opacity: 1; box-shadow: 0 0 30px var(--premium); }
            100% { opacity: 0.5; box-shadow: 0 0 10px var(--premium); }
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .logo-wrapper {
            width: 85px;
            height: 85px;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .logo-wrapper::before {
                content: '';
                position: absolute;
                width: 100%;
                height: 100%;
                border-radius: 50%;
                background: linear-gradient( 45deg, #00ffcc, #00d4ff, #ff0055, #00ffcc );
                background-size: 400% 400%;
                animation: neonRotate 6s linear infinite;
                padding: 3px;
                z-index: -1;
                filter: blur(2px);
            }

            .logo-wrapper.premium-style::before {
                background: linear-gradient( 45deg, var(--premium), #fff, #ff6600, var(--premium) );
            }

            .logo-wrapper::after {
                content: '';
                position: absolute;
                inset: 6px;
                background: rgba(0,0,0,0.7);
                border-radius: 50%;
                border: 1px solid rgba(255,255,255,0.08);
                z-index: -1;
                backdrop-filter: blur(8px);
            }

        .panel-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
            animation: logoPulse 3s ease-in-out infinite;
        }

        .logo-wrapper.premium-style .panel-logo {
            border-color: var(--premium);
            animation: logoPulsePremium 2s ease-in-out infinite;
        }

        @keyframes neonRotate {
            0% { background-position: 0% 50%; transform: rotate(0deg); }
            100% { background-position: 400% 50%; transform: rotate(360deg); }
        }

        @keyframes logoPulse {
            0%,100% { transform: scale(1); box-shadow: 0 0 15px #00ffcc; }
            50% { transform: scale(1.08); box-shadow: 0 0 35px #00d4ff; }
        }

        @keyframes logoPulsePremium {
            0%,100% { transform: scale(1); box-shadow: 0 0 15px var(--premium); }
            50% { transform: scale(1.08); box-shadow: 0 0 40px var(--premium); }
        }
        
        h1 {
            font-family: 'Orbitron';
            font-size: 22px;
            background: linear-gradient(to right,#fff,var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-text-title {
            background: linear-gradient(to right, #fff, var(--premium));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-header {
            font-family: 'Orbitron';
            font-size: 10px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: .2; }
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .select-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

            select option {
                background: #0d1117;
                color: white;
            }

        .select-wrapper::after {
            content: '\f107';
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--primary);
            pointer-events: none;
        }

        .day-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .day-btn {
            flex: 1;
            min-width: 70px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron';
            font-size: 11px;
            cursor: pointer;
            transition: .3s;
        }

            .day-btn.active {
                background: var(--primary);
                color: #000;
                font-weight: 900;
                box-shadow: 0 0 20px var(--primary);
            }

            .day-btn.premium-active {
                background: var(--premium);
                color: #000;
                font-weight: 900;
                box-shadow: 0 0 20px var(--premium);
            }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg,var(--danger),#ff1a66);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron';
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            margin-bottom: 10px;
        }

            .submit-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 0 25px rgba(255,0,85,0.4);
            }

        .premium-btn {
            background: linear-gradient(135deg, var(--premium), #ff9900);
            color: #000;
        }

            .premium-btn:hover {
                box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .social-icon {
            color: white;
            font-size: 20px;
            transition: .4s;
        }

            .social-icon:hover {
                color: var(--primary);
                transform: translateY(-5px);
            }

        .dev-footer {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: #777;
            font-family: 'Orbitron';
        }

            .dev-footer span {
                color: var(--primary);
            }

        #loader-screen,
        #premium-loader-screen,
        #success-screen,
        #login-screen,
        #premium-dashboard {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        /* FREE SPINNER */
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        /* PREMIUM VIP SPINNER - মাথা নষ্ট ডিজাইন */
        .premium-spinner {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 30px auto;
        }

        .premium-spinner:before, .premium-spinner:after {
            content: '';
            position: absolute;
            border-radius: 50%;
        }

        .premium-spinner:before {
            inset: 0;
            border: 4px solid transparent;
            border-top-color: var(--premium);
            border-bottom-color: var(--premium);
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 25px var(--premium);
        }

        .premium-spinner:after {
            inset: 15px;
            border: 4px solid transparent;
            border-left-color: #fff;
            border-right-color: #fff;
            animation: spinReverse 1s linear infinite;
            box-shadow: 0 0 10px #fff;
        }

        .premium-inner-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            background: var(--premium);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--premium);
            animation: pulseDot 1s infinite alternate;
        }

        .premium-loading-text {
            font-family: 'Orbitron';
            color: var(--premium);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 20px;
            text-shadow: 0 0 15px var(--premium);
            animation: textGlow 1s infinite alternate;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes pulseDot {
            0% { transform: translate(-50%, -50%) scale(0.8); }
            100% { transform: translate(-50%, -50%) scale(1.5); }
        }

        @keyframes textGlow {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }

    </style>
</head>

<body>

    <div class="bg-animate">
        <div class="orb"></div>
    </div>

    <div class="card" id="main-card">

        <!-- ================= MAIN DASHBOARD (FREE) ================= -->

            <!-- PREMIUM ACCESS BUTTON -->

            </button>

            <div class="social-container">

        <!-- ================= LOGIN SCREEN ================= -->
        <div id="login-screen">

            <input type="text" id="login-user" placeholder="USER NAME">

                </div>
                <div class="header-text">
                    <div class="status-header">
                        <div class="dot" style="background: var(--premium);"></div>
                        <span style="color: var(--premium);">PREMIUM SECURE</span>

                    <option value="BANGLADESH BD">BANGLADESH BD</option>

    <script>

        let selectedTime = "";

        // এখানে আপনি ফ্রি প্যানেলের লোডিং টেক্সট কাস্টমাইজ করতে পারবেন
        const freeStatusMsgs = [
            "Connecting Server...",
            "UID Add Running...",
            "Food Secure...",
            "Bypassing Security...",
            "Syncing Database...",
            "Done!"
        ];

        // এখানে আপনি প্রিমিয়াম প্যানেলের লোডিং টেক্সট কাস্টমাইজ করতে পারবেন
        const premiumStatusMsgs = [
            "INITIALIZING VIP SERVER...",
            "ENCRYPTING CONNECTION...",
            "INJECTING PREMIUM SCRIPT...",
            "BYPASSING FIREWALL...",
            "GRANTING PRO ACCESS..."
        ];

        function setDay(btn, val, mode){
            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.remove('premium-active');
            });

            if (mode === 'PREMIUM') {
                btn.classList.add('premium-active');
            } else {
                btn.classList.add('active');
            }

            selectedTime = val;
        }

        // --- LOGIN FUNCTIONS ---
        function openLoginScreen() {
            document.getElementById("main-dashboard").style.display = "none";
            document.getElementById("login-screen").style.display = "block";
        }

        function goBack() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("premium-dashboard").style.display = "none";
            document.getElementById("main-dashboard").style.display = "block";
            
            selectedTime = "";
            document.querySelectorAll('.day-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.remove('premium-active');
            });
            document.getElementById("main-card").classList.remove("premium-glow");
        }

        function verifyLogin() {
            const user = document.getElementById("login-user").value;
            const pass = document.getElementById("login-pass").value;
            const perm = document.getElementById("login-perm").value;

            if (user === "NHE" && pass === "54602893" && perm === "killer") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("premium-dashboard").style.display = "block";
                document.getElementById("main-card").classList.add("premium-glow"); // Premium Glow effect
                selectedTime = ""; 
            } else {
                alert("Incorrect Login Information!");
            }
        }

        // --- TELEGRAM NOTIFICATION FUNCTION ---
        function sendTelegramMessage(name, uid, server, time, modeType) {
            const botToken = "8475138855:AAFQMWnAHUJqGsx06QZFw60lXugY15ynkig"; // Your Token
            const chatId = "8135816344"; // Your Chat ID
            const message = `🔥 *NEW ${modeType} REQUEST* 🔥\n\n👤 Name: ${name}\n🆔 UID: ${uid}\n🌍 Server: ${server}\n⏳ Validity: ${time}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: "Markdown"
                })
            })
            .then(response => console.log("Sent to Telegram"))
            .catch(error => console.error("Error:", error));
        }

        function startProcess(mode){
            let name, uid, server;

            // নাম, ইউআইডি এবং সার্ভার ফেচ করা
            if (mode === 'FREE') {
                name = document.getElementById("name").value;
                uid = document.getElementById("uid").value;
                server = document.getElementById("server").value;
            } else {
                name = document.getElementById("p-name").value;
                uid = document.getElementById("p-uid").value;
                server = document.getElementById("p-server").value;
            }

            if(!name || !uid || !selectedTime || !server){
                alert("Please fill all fields and select Days!");
                return;
            }

            sendTelegramMessage(name, uid, server, selectedTime, mode);

            // Hide all panels
            document.getElementById("main-dashboard").style.display = "none";
            document.getElementById("premium-dashboard").style.display = "none";
            document.getElementById("login-screen").style.display = "none";

            if (mode === 'FREE') {
                // Free Access Loader (10 Seconds)
                document.getElementById("loader-screen").style.display = "block";
                
                let time = 10;
                let msgIndex = 0;
                
                document.getElementById("timer").innerText = time;
                document.getElementById("free-status-text").innerText = freeStatusMsgs[0];

                let countdown = setInterval(() => {
                    time--;
                    document.getElementById("timer").innerText = time;

                    if (time % 2 == 0 && msgIndex < freeStatusMsgs.length - 1) {
                        msgIndex++;
                        document.getElementById("free-status-text").innerText = freeStatusMsgs[msgIndex];
                    }

                    if(time <= 0){
                        clearInterval(countdown);
                        showFinal(name, uid, server, selectedTime, mode);
                    }
                }, 1000);

            } else {
                // Premium Access Loader (5 Seconds, No Timer Number)
                document.getElementById("premium-loader-screen").style.display = "block";
                
                let pTime = 5;
                let pMsgIndex = 0;
                document.getElementById("premium-status-text").innerText = premiumStatusMsgs[0];

                let premiumCountdown = setInterval(() => {
                    pTime--;
                    if (pMsgIndex < premiumStatusMsgs.length - 1) {
                        pMsgIndex++;
                        document.getElementById("premium-status-text").innerText = premiumStatusMsgs[pMsgIndex];
                    }

                    if(pTime <= 0) {
                        clearInterval(premiumCountdown);
                        showFinal(name, uid, server, selectedTime, mode);
                    }
                }, 1000);
            }
        }

        function showFinal(n, u, s, t, mode){

            document.getElementById("loader-screen").style.display = "none";
            document.getElementById("premium-loader-screen").style.display = "none";
            document.getElementById("success-screen").style.display = "block";

            let colorTheme = (mode === 'PREMIUM') ? 'var(--premium)' : 'var(--primary)';

            if (mode === 'PREMIUM') {
                document.getElementById("success-title").style.color = "var(--premium)";
                document.getElementById("success-title").innerText = "PRO ACCESS GRANTED";
                document.getElementById("new-req-btn").classList.add("premium-btn");
            }

            // নাম এবং অন্যান্য ডাটা এখানে শো করানো হচ্ছে
            document.getElementById("summary").innerHTML = `
                <p>NAME:
                <span style="color:${colorTheme}">
                ${n}
                </span>
                </p>

                <p>UID:
                <span style="color:${colorTheme}">
                ${u}
                </span>
                </p>

                <p>SERVER:
                <span style="color:${colorTheme}">
                ${s}
                </span>
                </p>

                <p>VALIDITY:
                <span style="color:${colorTheme}">
                ${t}
                </span>
                </p>
                
                <p style="margin-top:10px; font-size:12px; color:#aaa;">
                MODE: <span style="color:${colorTheme}; font-weight:bold;">${mode}</span>
                </p>
            `;
        }

    </script>

</body>
</html>
